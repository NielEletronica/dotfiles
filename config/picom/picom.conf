# ~/.config/picom/picom.conf

backend = "glx";
vsync = true;

# Disable all visual effects
shadow = false;
fading = false;
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
detect-rounded-corners = false;

# blur
backend = "glx";                # GLX is required for advanced blur
blur-background = true;         # Enable background blur
blur-method = "dual_kawase";    # Select method
blur-strength = 5;              # Strength (1-20)
blur-size = 10;                 # Size of the blur


# No animations / transitions
fade-in-step = 0;
fade-out-step = 0;
fade-delta = 0;

# Fix potential glitches
use-damage = true;
unredir-if-possible = true;

# Optional: better fullscreen behavior
unredir-if-possible-delay = 0;
